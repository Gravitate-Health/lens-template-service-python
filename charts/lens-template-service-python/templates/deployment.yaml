apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lens-template-service-python.fullname" . }}
  labels:
    {{- include "lens-template-service-python.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lens-template-service-python.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lens-template-service-python.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "lens-template-service-python.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if or .Values.config.env .Values.secret.env }}
          envFrom:
            {{- if .Values.config.env }}
            - configMapRef:
                name: {{ include "lens-template-service-python.fullname" . }}
            {{- end }}
            {{- if .Values.secret.env }}
            - secretRef:
                name: {{ include "lens-template-service-python.fullname" . }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
