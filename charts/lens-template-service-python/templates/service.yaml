apiVersion: v1
kind: Service
metadata:
  name: {{ include "lens-template-service-python.fullname" . }}
  labels:
    {{- include "lens-template-service-python.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "lens-template-service-python.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
